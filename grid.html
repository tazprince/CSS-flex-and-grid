<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>grid</title>
    <style>
      .container {
        display: grid;
        /* grid-template-columns: 100px 100px 100px; */
        /* grid-template-columns: repeat(10,100px); */
        /* grid-template-columns: repeat(3,1fr); */
        /* grid-template-columns: repeat(3, 1fr) 2fr 4fr; */
        width: 1000px;
        border: 2px solid pink;
        grid-template-columns: 100px 1fr 200px;
        /*1 fr = 1coloumn=100px , 3coloumn=200px , 1fr = 1000-300 = 700px*/
        text-align: center;
        gap: 20px;
      }
      .box {
        border: 2px solid salmon;
        font-size: 2rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box">box 1</div>
      <div class="box">box 2</div>
      <div class="box">box 3</div>
      <div class="box">box 4</div>
      <div class="box">box 5</div>
      <div class="box">box 6</div>
      <div class="box">box 7</div>
      <div class="box">box 8</div>
      <div class="box">box 9</div>
      <div class="box">box 10</div>
      <div class="box">box 11</div>
      <div class="box">box 12</div>
      <div class="box">box 13</div>
      <div class="box">box 14</div>
      <div class="box">box 15</div>
      <div class="box">box 16</div>
      <div class="box">box 17</div>
      <div class="box">box 18</div>
      <div class="box">box 19</div>
      <div class="box">box 20</div>
    </div>
  </body>
</html>
